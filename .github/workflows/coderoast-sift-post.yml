name: CodeRoast Sift post

# The privileged half of the fork-safe Sift dogfood, now a JOB the caller chains after its `ci` job
# (`needs: ci`, PR-only): the `ci` build renders the comment to the `sift-comment` artifact under a
# READ-ONLY token (fork-safe even on fork-controlled code); THIS job does the ONE privileged thing —
# post the sticky comment from that trusted, pre-rendered artifact of the SAME run.
#
# ⛔ FORBIDDEN in this job (it holds pull-requests: write): actions/checkout of the PR head, or ANY
#    build / compile / test / npm / make step. It runs NO fork-controlled code — it consumes ONLY the
#    pre-rendered artifact. Keep the build in the read-only `ci` render; keep the write here. Never
#    cross the streams. (sift-action's poster enforces head_sha match + size caps.)

on:
  workflow_call:
    inputs:
      run-id:
        description: 'The run whose sift-comment artifact to post — the caller passes github.run_id (same-run post).'
        required: true
        type: string
      runs-on:
        description: 'Runner label for the post job. Defaults to hosted ubuntu-latest. PUBLIC callers MUST omit it — a self-hosted runner reachable from a public repo fork PR is an RCE. PRIVATE callers pass vars.CI_RUNS_ON (fallback ubuntu-latest) to route to the self-hosted fleet.'
        type: string
        required: false
        default: 'ubuntu-latest'

permissions:
  pull-requests: write   # post/update the sticky comment — the ONLY write this needs
  actions: read          # download the run's rendered artifact

jobs:
  post:
    runs-on: ${{ inputs.runs-on }}
    steps:
      # NO actions/checkout, NO build (see FORBIDDEN). `post` mode downloads the sift-comment artifact
      # from the run and upserts the sticky comment — nothing else.
      - name: Post the pre-rendered Sift comment
        uses: CodeRoasted/sift-action@v1
        with:
          mode: post
          run-id: ${{ inputs.run-id }}
