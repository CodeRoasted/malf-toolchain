name: CodeRoast Lint

# Shared lint gate for every CodeRoast repo, as a reusable workflow: actionlint over the caller's
# workflows + the C++23 module-conformance gate over the caller's own module units. Both are
# per-repo-local and toggle true/false (default true). Replaces the copy-pasted-and-drifted per-repo
# workflow-lint.yml, and lets every C++ package repo self-check its modules on its own PRs.
#
# Cross-repo determinism gates (wall-clock, RNG) are NOT here — they span multiple repos and only the
# superproject can run them; it wires them as its own chained jobs.

on:
  workflow_call:
    inputs:
      actionlint:
        description: 'Run actionlint over the caller repo workflows.'
        type: boolean
        required: false
        default: true
      module-conformance:
        description: 'Run the C++23 module-conformance gate over the caller repo module units. Set false for a repo with no .cppm (e.g. the superproject, a TS repo).'
        type: boolean
        required: false
        default: true

permissions:
  contents: read

concurrency:
  group: coderoast-lint-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ${{ vars.CI_RUNS_ON || 'ubuntu-latest' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install actionlint
        if: ${{ inputs.actionlint }}
        run: |
          curl -sSfL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash | bash

      - name: Run actionlint
        if: ${{ inputs.actionlint }}
        run: |
          ./actionlint -color

      - name: C++ modules conformance
        if: ${{ inputs.module-conformance }}
        uses: CodeRoasted/malf-toolchain/.github/actions/coderoast-module-conformance@main
