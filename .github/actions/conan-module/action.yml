name: 'Conan Module'
description: |
  Test / create one Conan module (package) using Conan and CMake directly. Each phase is gated by an
  explicit input so callers can build, test and/or package a single module.

  This is a thin wrapper over `conan_module.sh` (same directory) — the single source of truth for the
  per-module build logic, shared with the `coderoast-ci` composite's module loop. It assumes the conan
  profile is already installed in `$CONAN_HOME/profiles` (by `setup-build-env`); it does NOT vendor or
  copy a profile itself.

inputs:
  module:
    description: Module path relative to the repo root (e.g. `core`, `.`, `infra/redis`, `explain`).
    required: true
  test:
    description: "'true' to conan install + cmake build + ctest the module (Release). Anything else skips the phase."
    required: true
  create:
    description: "'true' to run `conan create <module>`. Anything else skips it."
    required: true
  profile:
    description: Conan profile name in `$CONAN_HOME/profiles` to build with.
    required: false
    default: 'linux-gcc15-release'

runs:
  using: composite
  steps:
    - name: Build / test / create ${{ inputs.module }}
      shell: bash
      env:
        MODULE: ${{ inputs.module }}
        TEST: ${{ inputs.test }}
        CREATE: ${{ inputs.create }}
        PROFILE_NAME: ${{ inputs.profile }}
      run: bash "$GITHUB_ACTION_PATH/conan_module.sh" "$MODULE" "$TEST" "$CREATE" "$PROFILE_NAME"
