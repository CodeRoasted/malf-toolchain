name: 'Conan Module'
description: |
  Test / create one Conan module (package) using Conan and CMake directly. Each phase is
  gated by an explicit input so callers can skip work the diff filter declared unaffected
  (plumb straight from `dorny/paths-filter` outputs).

  Single source of truth: this reconciles the three drifted per-repo copies that previously
  lived in coderoast-server / insight-eidos / logcraft. It assumes the conan profile is
  already installed in `$CONAN_HOME/profiles` (by `setup-build-env`) — it does NOT vendor or
  copy a profile itself.

inputs:
  module:
    description: Module path relative to the repo root (e.g. `core`, `auth`, `infra/redis`, `explain`).
    required: true
  test:
    description: |
      'true' to conan install + cmake build + ctest the module (Release). Anything else skips
      the phase.
    required: true
  create:
    description: |
      'true' to run `conan create <module>`. Anything else skips it.
    required: true
  profile:
    description: Conan profile name in `$CONAN_HOME/profiles` to build with.
    required: false
    default: 'linux-gcc15-release'

runs:
  using: composite
  steps:
    - name: Install + build ${{ inputs.module }}
      if: inputs.test == 'true'
      shell: bash
      env:
        MODULE: ${{ inputs.module }}
        PROFILE_NAME: ${{ inputs.profile }}
      run: |
        set -euo pipefail
        exec > >(tee -a "$GITHUB_WORKSPACE/build.log") 2>&1   # mirror build+test output — the Sift dogfood diffs it
        # Let a crashing test drop a core so the diagnostic step below can post-mortem it. This is
        # the only reliable capture for a *flaky* crash (e.g. a shutdown/teardown race): attaching
        # gdb serialises signals and routinely masks the race, whereas a natural-run core does not.
        # core_pattern is runner-owned (no passwordless sudo here); the diagnostic step handles both
        # cwd cores and systemd-coredump.
        ulimit -c unlimited 2>/dev/null || true
        PROFILE="$CONAN_HOME/profiles/$PROFILE_NAME"
        conan install "$MODULE" \
          --output-folder="build/$MODULE" \
          --build=missing \
          --profile:host="$PROFILE" \
          --profile:build="$PROFILE" \
          -s build_type=Release
        cmake --preset conan-release -S "$MODULE" -B "build/$MODULE"
        cmake --build "build/$MODULE"
        # Robust test detection (folded in from the eidos copy): some modules emit Testing/ but
        # not a top-level CTestTestfile.cmake.
        if [[ -d "build/$MODULE/Testing" || -f "build/$MODULE/CTestTestfile.cmake" ]]; then
          ctest --test-dir "build/$MODULE" --output-on-failure
        fi

    # On a failed test phase, capture a backtrace for whatever crashed — at ANY phase: startup
    # (e.g. SIGILL from a library auto-dispatching CPU features beyond the -march baseline), the
    # test body, or *teardown* (a static-destruction / shutdown race that traps after the test
    # already reported PASSED). A bare `--gtest_list_tests` only exercises startup, so it cannot
    # see a run/teardown crash; here we (1) post-mortem any natural-run core — the only reliable
    # catch for a flaky race — then (2) re-run the ctest-recorded failed tests under gdb, then
    # (3) fall back to the startup probe when ctest recorded no per-test failure.
    - name: Diagnose test crash for ${{ inputs.module }}
      if: failure() && inputs.test == 'true'
      shell: bash
      env:
        MODULE: ${{ inputs.module }}
      run: |
        set +e
        echo "::group::Runner CPU features"
        lscpu | head -25
        grep -m1 -oE '(sse4_2|avx2?|avx512[a-z]*|bmi[12]?|fma|adx|popcnt)( |$)' /proc/cpuinfo | sort -u
        echo "::endgroup::"
        # Skip the sudo install when gdb is already present — on a self-hosted runner (no passwordless
        # sudo) an unguarded sudo here would block this diagnostic on an interactive password prompt.
        command -v gdb >/dev/null 2>&1 || sudo apt-get install -y -qq gdb >/dev/null

        # The test binaries this module built.
        bins=()
        for b in "build/$MODULE"/*tests "build/$MODULE"/*_tests; do [ -x "$b" ] && bins+=("$b"); done
        [ "${#bins[@]}" -gt 0 ] || { echo "no test binary under build/$MODULE"; exit 0; }

        # Run a binary under gdb, stopping + dumping a full backtrace on any fatal signal.
        # $1=bin  $2=run args (e.g. "--gtest_filter=Suite.Case" or "--gtest_list_tests").
        run_under_gdb() {
          gdb --batch \
              -ex 'set pagination off' \
              -ex 'handle SIGILL SIGSEGV SIGABRT SIGBUS stop print pass' \
              -ex "run $2" \
              -ex 'echo \n== thread apply all bt full ==\n' \
              -ex 'thread apply all bt full' \
              -ex 'info registers' \
              -ex 'x/4i $pc' \
              "$1" 2>&1 | tail -200
        }

        # (1) Post-mortem any core the natural ctest run dropped — works regardless of crash phase
        #     and does not perturb timing, so it is the reliable catch for a flaky teardown race.
        shopt -s nullglob
        for core in core core.* "build/$MODULE"/core "build/$MODULE"/core.*; do
          [ -f "$core" ] || continue
          for bin in "${bins[@]}"; do
            echo "::group::gdb core post-mortem: $(basename "$bin") $core"
            gdb --batch -ex 'set pagination off' -ex 'thread apply all bt full' \
                -ex 'info registers' "$bin" "$core" 2>&1 | tail -200
            echo "::endgroup::"
          done
        done
        if command -v coredumpctl >/dev/null 2>&1; then  # systemd-coredump runners keep cores in the journal
          echo "::group::coredumpctl (last 5)"
          coredumpctl list --no-pager 2>/dev/null | tail -6
          # Extract the latest core per binary to a file and gdb it — portable across systemd
          # versions (the `coredumpctl gdb` debugger-args flag is not).
          for bin in "${bins[@]}"; do
            base="$(basename "$bin")"
            extracted="build/$MODULE/$base.core"
            if coredumpctl dump "$base" --output="$extracted" >/dev/null 2>&1 && [ -s "$extracted" ]; then
              gdb --batch -ex 'set pagination off' -ex 'thread apply all bt full' \
                  -ex 'info registers' "$bin" "$extracted" 2>&1 | tail -200
            fi
          done
          echo "::endgroup::"
        fi

        # (2) Re-run the tests ctest marked failed, under gdb. The binary executes the real test
        #     body + teardown, so this catches run/teardown crashes the startup probe never could.
        #     A teardown race is flaky — loop a few times. (gdb can mask the race; (1) is the backstop.)
        failed_log="build/$MODULE/Testing/Temporary/LastTestsFailed.log"
        if [ -f "$failed_log" ]; then
          while IFS= read -r line; do
            name="${line#*:}"   # strip the leading "<index>:"
            [ -n "$name" ] || continue
            for bin in "${bins[@]}"; do
              echo "::group::gdb x8 on $(basename "$bin") --gtest_filter=$name"
              for attempt in $(seq 1 8); do
                echo "--- attempt $attempt ---"
                out="$(run_under_gdb "$bin" "--gtest_filter=$name")"
                echo "$out"
                if echo "$out" | grep -qE 'received signal|SIGSEGV|SIGABRT|SIGBUS|SIGILL'; then
                  echo "captured a crashing backtrace on attempt $attempt"; break
                fi
              done
              echo "::endgroup::"
            done
          done < "$failed_log"
        else
          # (3) No per-test failure recorded → a startup crash before any test ran. Probe with the
          #     test-list load (the original fast SIGILL catch).
          for bin in "${bins[@]}"; do
            echo "::group::gdb startup probe (--gtest_list_tests) on $(basename "$bin")"
            run_under_gdb "$bin" "--gtest_list_tests"
            echo "::endgroup::"
          done
        fi

    - name: Create ${{ inputs.module }} package
      if: inputs.create == 'true'
      shell: bash
      env:
        MODULE: ${{ inputs.module }}
        PROFILE_NAME: ${{ inputs.profile }}
      run: |
        set -euo pipefail
        exec > >(tee -a "$GITHUB_WORKSPACE/build.log") 2>&1   # mirror build+test output — the Sift dogfood diffs it
        PROFILE="$CONAN_HOME/profiles/$PROFILE_NAME"
        conan create "$MODULE" \
          --build=missing \
          --build-test=missing \
          --profile:host="$PROFILE" \
          --profile:build="$PROFILE"
