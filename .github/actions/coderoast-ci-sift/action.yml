name: 'CodeRoast Sift dogfood'
description: |
  The shared Sift dogfood tail for every CodeRoast CI job — the SAME integration an external Sift user
  writes (the published `sift-action@v1`), wired to the canonical NAMED-baseline topology
  (sift-action examples/baselines/ci.yml — "the user is King of the baseline"):

  - push to main / tag on main: diff vs the named main baseline (`sift-baseline-main-<job>`), then
    re-seed it (green-gated — a red build never overwrites the last green).
  - PR: diff vs the main baseline (the headline sticky comment) AND, opt-out via `pr-vs-previous`,
    vs the PR's OWN previous run (its own tagged comment, quiet unless significant); then seed the
    per-PR baseline (`sift-baseline-<job>-pr-<n>`) for the next push.

  Named baselines resolve repo-wide by artifact name, so tag builds (no branch) and PRs (never ran on
  main) both diff against main's last green — provided SOMETHING seeds the main name (the repo's CI
  must also run on push:main / tags for the seeding legs to exist).

  Two transport modes, one switch:
  - `comment` (private / same-repo): diff AND post the sticky comment(s), in the CI job. Skipped on
    fork PRs (a read-only token can't post) — a no-op on PRIVATE repos (no forks).
  - `render` (public / fork-safe): diff + render the comment body to the `sift-comment` artifact,
    posting NOTHING; the privileged `coderoast-sift-post` workflow (`workflow_run`) posts it. Render
    keeps a SINGLE diff (vs main) — the render dir holds one body, so the vs-previous nicety is
    comment-mode only.

  ADVISORY GUARANTEE — the caller MUST set `continue-on-error: true` on the step that invokes this
  action (composite-inner `continue-on-error` is not honoured); inner steps use `if: always()` only for
  ordering. Optional `courtesy-endpoint`/`courtesy-token` add the hosted `--explain` pass (comment mode
  only; off unless supplied).

inputs:
  mode:
    description: 'comment (diff + post, private/same-repo) | render (diff + upload the comment artifact for coderoast-sift-post, public/fork-safe).'
    required: false
    default: 'comment'
  build-status:
    description: "green|red for the build being diffed — pass e.g. job.status == 'success' && 'green' || 'red'."
    required: true
  log:
    description: 'Build-log file Sift diffs.'
    required: false
    default: 'build.log'
  job:
    description: >-
      Baseline lineage name for this build job — folds into the named-baseline artifacts
      (`sift-baseline-main-<job>`, `sift-baseline-<job>-pr-<n>`). Give each job of a multi-job
      pipeline its own value.
    required: false
    default: 'build'
  baseline:
    description: >-
      Override the vs-main baseline SOURCE (sift-action grammar: auto | branch=<name> |
      artifact=<name> | path=<file> | none). Empty (default) = the named main baseline
      `artifact=sift-baseline-main-<job>` — the caller stays King of the baseline.
    required: false
    default: ''
  pr-vs-previous:
    description: 'PRs (comment mode): ALSO diff this build against the PR''s own previous run — its own tagged comment, quiet unless significant. true|false.'
    required: false
    default: 'true'
  commit-comment:
    description: 'sift-action commit-comment mode (regression|off|always). comment mode only.'
    required: false
    default: 'regression'
  fail-on:
    description: 'sift-action fail-on threshold. Advisory dogfood keeps this none.'
    required: false
    default: 'none'
  courtesy-endpoint:
    description: 'Optional hosted --explain endpoint (comment mode). Omit to skip the narrative dogfood.'
    required: false
    default: ''
  courtesy-token:
    description: 'Optional token for the courtesy endpoint.'
    required: false
    default: ''

runs:
  using: composite
  steps:
    # The one source expression, resolved once: caller override, else the named main baseline.
    - name: Resolve the baseline source
      id: source
      shell: bash
      env:
        OVERRIDE: ${{ inputs.baseline }}
        JOB: ${{ inputs.job }}
      run: |
        echo "baseline=${OVERRIDE:-artifact=sift-baseline-main-$JOB}" >> "$GITHUB_OUTPUT"

    # ── comment mode · push/tag: diff vs the main baseline, then re-seed it (green-gated) ──
    - name: Sift — vs main baseline + re-seed (push/tag)
      if: ${{ inputs.mode == 'comment' && always() && github.event_name != 'pull_request' }}
      id: sift-push
      uses: CodeRoasted/sift-action@v1
      with:
        log: ${{ inputs.log }}
        baseline: ${{ steps.source.outputs.baseline }}
        baseline-name: sift-baseline-main-${{ inputs.job }}
        fail-on: ${{ inputs.fail-on }}
        commit-comment: ${{ inputs.commit-comment }}
        build-status: ${{ inputs.build-status }}
        explain: false

    # ── comment mode · PR: ① vs the main baseline (the headline sticky comment) ──
    - name: Sift — vs main baseline (PR)
      if: ${{ inputs.mode == 'comment' && always() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork != true }}
      id: sift
      uses: CodeRoasted/sift-action@v1
      with:
        log: ${{ inputs.log }}
        baseline: ${{ steps.source.outputs.baseline }}
        publish-baseline: never   # the vs-previous step below owns this PR's seeding
        fail-on: ${{ inputs.fail-on }}
        commit-comment: ${{ inputs.commit-comment }}
        build-status: ${{ inputs.build-status }}
        explain: false

    # ── comment mode · PR: ② vs this PR's previous run, then seed the per-PR baseline ──
    - name: Sift — vs previous run of this PR
      if: ${{ inputs.mode == 'comment' && always() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork != true && inputs.pr-vs-previous == 'true' }}
      uses: CodeRoasted/sift-action@v1
      with:
        log: ${{ inputs.log }}
        baseline: artifact=sift-baseline-${{ inputs.job }}-pr-${{ github.event.number }}
        baseline-name: sift-baseline-${{ inputs.job }}-pr-${{ github.event.number }}
        comment-tag: vs-previous-run
        pr-comment: significant   # quiet unless something moved since the last push
        build-status: ${{ inputs.build-status }}
        explain: false

    - name: Dogfood --explain via the courtesy endpoint (optional CodeRoast infra; comment mode)
      if: ${{ inputs.mode == 'comment' && always() && inputs.courtesy-endpoint != '' && github.event.pull_request.head.repo.fork != true }}
      uses: CodeRoasted/malf-toolchain/.github/actions/sift-courtesy-dogfood@main
      with:
        endpoint: ${{ inputs.courtesy-endpoint }}
        token: ${{ inputs.courtesy-token }}
        report: ${{ steps.sift.outputs.report-path || steps.sift-push.outputs.report-path }}

    # ── render mode: diff + render to an artifact, NO post (fork-safe; the poster follows) ──
    # Single diff (vs main): the render dir holds one body. On a push:main render run this
    # ALSO re-seeds the main baseline (green-gated), same as comment mode.
    - name: Sift — structural diff + render (fork-safe; posts nothing)
      if: ${{ inputs.mode == 'render' && always() }}
      uses: CodeRoasted/sift-action@v1
      with:
        log: ${{ inputs.log }}
        mode: render
        baseline: ${{ steps.source.outputs.baseline }}
        baseline-name: ${{ github.event_name == 'pull_request' && format('sift-baseline-{0}-pr-{1}', inputs.job, github.event.number) || format('sift-baseline-main-{0}', inputs.job) }}
        build-status: ${{ inputs.build-status }}

    - name: Upload the rendered comment (coderoast-sift-post posts it)
      # PRs only — on a push:main run the render step SEEDS the baseline (no sift-comment/ to upload).
      if: ${{ inputs.mode == 'render' && always() && github.event_name == 'pull_request' }}
      uses: actions/upload-artifact@v7
      with:
        name: sift-comment
        path: ${{ runner.temp }}/sift-comment/
        if-no-files-found: error
