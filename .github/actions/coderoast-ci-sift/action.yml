name: 'CodeRoast Sift dogfood'
description: |
  The shared Sift dogfood tail for every CodeRoast CI job — the SAME integration an external Sift user
  writes (the published `sift-action@v1`). Two modes, one switch:

  - `comment` (private / same-repo): diff the build log AND post the sticky comment, in the CI job.
    Skipped on fork PRs (a read-only token can't post) — a no-op on PRIVATE repos (no forks). This is
    the simple path.
  - `render` (public / fork-safe): diff + render the comment body to the `sift-comment` artifact,
    posting NOTHING. Runs on ALL PRs incl forks (read-only, so it's safe even on fork-controlled code);
    the privileged `coderoast-sift-post` workflow (`workflow_run`) posts the artifact afterwards.

  ADVISORY GUARANTEE — the caller MUST set `continue-on-error: true` on the step that invokes this
  action (composite-inner `continue-on-error` is not honoured); inner steps use `if: always()` only for
  ordering. Optional `courtesy-endpoint`/`courtesy-token` add the hosted `--explain` pass (comment mode
  only; off unless supplied).

inputs:
  mode:
    description: 'comment (diff + post, private/same-repo) | render (diff + upload the comment artifact for coderoast-sift-post, public/fork-safe).'
    required: false
    default: 'comment'
  build-status:
    description: "green|red for the build being diffed — pass e.g. job.status == 'success' && 'green' || 'red'."
    required: true
  log:
    description: 'Build-log file Sift diffs.'
    required: false
    default: 'build.log'
  commit-comment:
    description: 'sift-action commit-comment mode (regression|off|always). comment mode only.'
    required: false
    default: 'regression'
  fail-on:
    description: 'sift-action fail-on threshold. Advisory dogfood keeps this none.'
    required: false
    default: 'none'
  courtesy-endpoint:
    description: 'Optional hosted --explain endpoint (comment mode). Omit to skip the narrative dogfood.'
    required: false
    default: ''
  courtesy-token:
    description: 'Optional token for the courtesy endpoint.'
    required: false
    default: ''

runs:
  using: composite
  steps:
    # ── comment mode: diff + post directly (skipped on fork PRs; no-op on private repos) ──
    - name: Sift — structural diff + comment (advisory)
      if: ${{ inputs.mode == 'comment' && always() && github.event.pull_request.head.repo.fork != true }}
      id: sift
      uses: CodeRoasted/sift-action@v1
      with:
        log: ${{ inputs.log }}
        fail-on: ${{ inputs.fail-on }}
        commit-comment: ${{ inputs.commit-comment }}
        build-status: ${{ inputs.build-status }}
        explain: false

    - name: Dogfood --explain via the courtesy endpoint (optional CodeRoast infra; comment mode)
      if: ${{ inputs.mode == 'comment' && always() && inputs.courtesy-endpoint != '' && github.event.pull_request.head.repo.fork != true }}
      uses: CodeRoasted/malf-toolchain/.github/actions/sift-courtesy-dogfood@main
      with:
        endpoint: ${{ inputs.courtesy-endpoint }}
        token: ${{ inputs.courtesy-token }}
        report: ${{ steps.sift.outputs.report-path }}

    # ── render mode: diff + render to an artifact, NO post (fork-safe; poster comes later) ──
    - name: Sift — structural diff + render (fork-safe; posts nothing)
      if: ${{ inputs.mode == 'render' && always() }}
      uses: CodeRoasted/sift-action@v1
      with:
        log: ${{ inputs.log }}
        mode: render
        build-status: ${{ inputs.build-status }}

    - name: Upload the rendered comment (coderoast-sift-post posts it)
      # PRs only — on a push:main run the render step SEEDS the baseline (no sift-comment/ to upload).
      if: ${{ inputs.mode == 'render' && always() && github.event_name == 'pull_request' }}
      uses: actions/upload-artifact@v7
      with:
        name: sift-comment
        path: ${{ runner.temp }}/sift-comment/
        if-no-files-found: error
