name: 'CodeRoast CI'
description: |
  The whole build half of a CodeRoast C++ CI job, as ONE step: checkout + the gcc-15.3 toolchain +
  the canonical build env (apt / CMake 4.3.x / Conan / dep-binary cache / profile) + the cross-repo
  Conan vendor loop (data manifest) + a fresh build.log + the per-module build/test/create loop.

  Kills the copy-pasted checkout / setup / vendor / module-build boilerplate that previously lived in
  every consumer repo. The vendor loop is the shared `coderoast-vendor` action (single-sources the
  fetch script); the per-module build logic is shared from the sibling `conan-module` action.

  Use it as the FIRST (usually only) build step in the job. `runs-on` and `permissions` stay in the
  caller — they are job-level keys a composite action cannot hold. Follow this step with a
  `coderoast-ci-sift` step for the advisory Sift dogfood (kept separate so the caller can set
  `continue-on-error` on it — the advisory guarantee cannot be enforced from inside a composite).

inputs:
  vendor:
    description: |
      Newline-separated cross-repo Conan deps to restore before the build, one per row:
        <pkg> <version> <owner/repo> <public|private> [release-tag]
      `public` deps resolve with `github-token`; `private` deps use `release-token`. release-tag
      defaults to v<version>. `#` starts a comment. Blank / omitted = no vendoring (a tower-root repo).
    required: false
    default: ''
  modules:
    description: |
      Newline-separated modules to build in order, one per row:
        <module> [test] [create] [cmake-args...]
      module is a path relative to the repo root (`core`, `.`, `infra/redis`, `sift-cli`). `test` and
      `create` default to `true`; set either to `false` to skip that phase (e.g. leaf binaries build
      + test but do not `conan create`: `sift-cli true false`). Any fields AFTER create are extra cmake
      configure flags for the test build, e.g. `core true true -DPKG_BUILD_TESTS=ON` (for packages that
      gate their unit tests behind a flag). `#` starts a comment.
    required: true
  extra-apt:
    description: 'Extra apt packages for setup-build-env (e.g. "libpq-dev redis-tools postgresql-client").'
    required: false
    default: ''
  github-token:
    description: 'Token for PUBLIC-repo release reads — pass secrets.GITHUB_TOKEN. Required only if any vendor row is `public`.'
    required: false
    default: ''
  release-token:
    description: 'Token for PRIVATE-repo release reads — pass secrets.CR_RELEASE_TOKEN. Required only if any vendor row is `private`.'
    required: false
    default: ''
  fetch-depth:
    description: 'Checkout fetch-depth. 0 (full history) is required for the Sift baseline resolution.'
    required: false
    default: '0'
  profile:
    description: 'Conan profile name (in malf-toolchain profiles/) to install and build with.'
    required: false
    default: 'linux-gcc15-release'

runs:
  using: composite
  steps:
    - name: Checkout
      uses: actions/checkout@v5
      with:
        fetch-depth: ${{ inputs.fetch-depth }}

    - name: Provision gcc-15.3 toolchain (PR124309 fix; replaces PPA gcc-15 = 15.2)
      uses: CodeRoasted/malf-toolchain/.github/actions/setup-gcc153@main

    - name: Setup build env (apt + CMake 4.3.x + Conan + dep cache + canonical profile)
      uses: CodeRoasted/malf-toolchain/.github/actions/setup-build-env@main
      with:
        extra-apt: ${{ inputs.extra-apt }}
        profile: ${{ inputs.profile }}

    - name: Vendor cross-repo Conan deps
      uses: CodeRoasted/malf-toolchain/.github/actions/coderoast-vendor@main
      with:
        vendor: ${{ inputs.vendor }}
        github-token: ${{ inputs.github-token }}
        release-token: ${{ inputs.release-token }}

    - name: Start build.log capture (fresh, AFTER vendoring so Sift diffs only the build+test output)
      shell: bash
      run: ': > "$GITHUB_WORKSPACE/build.log"'

    - name: Build + test + create the modules
      shell: bash
      env:
        MODULES: ${{ inputs.modules }}
        PROFILE_NAME: ${{ inputs.profile }}
        CONAN_MODULE: ${{ github.action_path }}/../conan-module/conan_module.sh
        # Lockfile for the CI graph (adr/0038). NOTE this path does NOT go through malf —
        # conan_module.sh drives raw `conan install`/`conan create` — so MALF_LOCKFILE_STRICT
        # would be inert here; the script consumes these two variables instead. Every repo
        # reaches this action (directly, or via the coderoast-ci.yml reusable workflow), so
        # this is the ONE place they are set: a per-repo copy is the
        # [[ci-vendoring-baseline-drift]] failure by construction.
        MALF_LOCKFILE: ${{ github.action_path }}/../../../conan.lock
        # GATE (strict). Flipped '1' (pin) → '0' (gate) at the 1.8.4 head, after v1.8.3 was the
        # first observed-green cut (adr/0038 §Consequences). Strict drops --lockfile-partial, so
        # "a dependency entered UNLOCKED" is now a hard failure — cheap and attributable. The
        # residual risk stands and is accepted knowingly: the CI graph is `conan create` against
        # real cache packages while the desk is editables, and that difference cannot be rehearsed
        # locally; with no `push: [main]` the first strict run lands at the 1.8.4 tag, where a red
        # is the checkpoint working and is fixed forward. The lockfile was refreshed in the same
        # pass (`malf lock --update`), so it covers every ref the current graph resolves.
        MALF_LOCKFILE_PARTIAL: '0'
        # Build-time codegen reachability, same seam and same reason as the lockfile above:
        # this path does not go through malf, so malf's own export never reaches it.
        # logcraft/core's CMake FATALs unless it can find intent_library_codegen.py, and its
        # fallback -- the sibling <workspace>/malf -- is unreachable under `conan create`,
        # which builds from sources exported into the conan cache. Without this, every CI
        # `conan create` of logcraft_core dies at configure with the tool "not found".
        MALF_TOOLCHAIN_DIR: ${{ github.action_path }}/../../..
      run: |
        set -euo pipefail
        # Build each declared module in order through the single-sourced per-module logic (shared with
        # the conan-module action). A composite cannot loop a `uses:` step, so the loop calls the
        # script directly; `set -e` aborts on the first failing module (which the script has already
        # post-mortemed) exactly as separate steps would.
        while IFS= read -r row; do
          row="${row%%#*}"
          # shellcheck disable=SC2086
          set -- $row
          [ "$#" -ge 1 ] || continue
          module="$1"; test="${2:-true}"; create="${3:-true}"
          shift $(( $# < 3 ? $# : 3 ))   # any remaining fields are extra cmake configure flags
          cmake_args="$*"
          echo "::group::coderoast-ci: module $module (test=$test create=$create${cmake_args:+ cmake:$cmake_args})"
          bash "$CONAN_MODULE" "$module" "$test" "$create" "$PROFILE_NAME" "$cmake_args"
          echo "::endgroup::"
        done <<< "$MODULES"
