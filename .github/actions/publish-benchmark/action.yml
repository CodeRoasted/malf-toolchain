name: 'Publish Benchmark'
description: |
  Measure a package's benchmark suite fresh on the release runner and attach the raw google-benchmark
  JSON(s) as asset(s) on the package's OWN GitHub Release. The Topic-H benchmark-evidence producer:
  each engine measures itself at its tag and publishes its numbers; the superproject's aggregation job
  later merges every package's asset into the public coderoast-hub.

  Thin wrapper: the measure + scaling-guard is the single-sourced `measure-benchmark` action; this adds
  "ensure the Release exists + upload". (The `coderoast-release` reusable workflow uses
  `measure-benchmark` directly so a bad benchmark gates the release before it is created.)

  Assumes setup-gcc153 + setup-build-env already ran and the caller vendored first-party deps.

inputs:
  outputs:
    description: |
      Newline-separated `<bench_exe_basename>=<hub-label>` pairs — one per bench executable this
      package's build produces. Each is uploaded as `<hub-label>-benchmark.json`.
    required: true
  tag:
    description: 'The package release tag (vX.Y.Z) whose Release receives the asset(s).'
    required: true
  subdir:
    description: 'malf bench target subdir (e.g. `core`); empty for a single-package repo or a multi-exe package.'
    required: false
    default: ''
  profile:
    description: 'Conan profile name in `$CONAN_HOME/profiles` to build with.'
    required: false
    default: 'linux-gcc15-release'
  token:
    description: 'Token with contents:write on THIS package repo (its own GITHUB_TOKEN) for the Release upload.'
    required: true

runs:
  using: composite
  steps:
    - name: Measure + validate the benchmark JSON(s)
      uses: CodeRoasted/malf-toolchain/.github/actions/measure-benchmark@main
      with:
        outputs: ${{ inputs.outputs }}
        subdir: ${{ inputs.subdir }}
        profile: ${{ inputs.profile }}
        dest: ${{ runner.temp }}/bench-assets

    - name: Ensure the Release exists + upload each JSON
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
        TAG: ${{ inputs.tag }}
      run: |
        set -euo pipefail
        # Idempotent: create the Release if the publish job hasn't (robust to a manual re-run).
        gh release view "$TAG" >/dev/null 2>&1 \
          || gh release create "$TAG" --title "$TAG" --notes "Benchmark evidence attached by CI for $TAG."
        published=0
        for f in "$RUNNER_TEMP"/bench-assets/*-benchmark.json; do
          [ -f "$f" ] || continue
          gh release upload "$TAG" "$f" --clobber
          echo "attached $(basename "$f") to Release $TAG"
          published=$((published + 1))
        done
        [ "$published" -gt 0 ] || { echo "::error::no benchmark JSON collected to publish"; exit 1; }
