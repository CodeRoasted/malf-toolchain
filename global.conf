core:required_conan_version=>=2.27.0
core.graph:compatibility_mode=optimized
core.download:retry=3
core.download:retry_wait=3
# Build-type isolation root fix: fold the build cflags/cxxflags into every package_id, so a
# sanitizer build (-fsanitize=... in cflags) gets a DISTINCT package_id from a non-sanitizer one
# even at the same compiler/build_type. Conan's default package_id ignores conf cflags, which let
# an ASan-instrumented zlib/simdjson be served to a non-ASan link ([[malf-build-type-isolation]]).
tools.info.package_id:confs=['tools.build:cflags', 'tools.build:cxxflags']

# Cross-package ABI coherence: pin every non-embed (statically-linked) dependency by RECIPE REVISION,
# not the default minor-version (`1.7.Z`). Our first-party packages are C++-MODULE libraries — a
# consumer compiles against the dependency's BMIs and its by-value spi/api structs (ParsedLine,
# CanonicalEvent, MetaLogDocument …) are baked into the consumer's binary. So ANY dependency source
# change is potentially ABI-affecting and MUST invalidate the consumer's cached binary. The default
# minor_mode pins only major.minor, so a struct field added at the SAME version (e.g. O4b's 16-byte
# `linked_span_ids` on ParsedLine/CanonicalEvent) did NOT change a consumer's package_id — conan
# served a stale, ABI-mismatched prebuilt binary against freshly-built canon → the 1.7.6 semantic-
# github SIGSEGV (bugs.md 2026-07-10). Recipe-rev pinning forces the whole affected sub-graph to
# rebuild in lockstep. Third-party (conancenter) deps have version-stable recipe revs, so this is a
# no-op for them; the win is entirely the first-party module ABI. Covers every current AND future
# first-party `requires` in one policy line (no per-conanfile drift — the [[ci-vendoring-baseline-drift]]
# failure mode).
core.package_id:default_non_embed_mode=recipe_revision_mode

# Generator migration (2026-06-05, Founder-greenlit): default to the maintained
# CMakeConfigDeps generator instead of classic CMakeDeps. Classic has been the home of
# the cross-stdlib editable build-dir KEYING LEAK ([[cmakedeps-leak-cross-stdlib-build-order]])
# and could not propagate a cmake_find_mode=none package's include dirs to coderoast->coderoast
# consumers (blocked the 1.5.0 C++ modules cascade). CMakeConfigDeps fixes both. The flag is
# still experimental (will_break_next) but is strictly better here; validated full-graph x
# both toolchains + determinism diagonal (technical_docs/adr/0015-cxx-named-modules-policy.md).
tools.cmake.cmakedeps:new=will_break_next
